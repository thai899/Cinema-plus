server.port=8081
spring.application.name=cinema-plus-backend

# ── SQL Server configuration ─────────────────────────────────
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CinemaPlusDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Disable H2 auto-configuration and ensure SQL Server is used
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Application secrets (replace before production)
cinema.app.jwtSecret=cinemaPlusSecretKey2024SuperSecure
cinema.app.jwtExpirationMs=86400000
